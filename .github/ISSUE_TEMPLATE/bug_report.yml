name: Bug Report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug
      placeholder: |
        1. Run `ratnosint7 scan example.com`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: ratnosint7 version (run `ratnosint7 --version` or `go version`)
      placeholder: e.g. 1.0.0
  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Relevant logs or error output
      render: shell
